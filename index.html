<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>FDQ 2026 — Classificação</title>
<link rel="icon" type="image/png" href="logo.png">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:#245236;background-image:radial-gradient(ellipse at top,#3a8255 0%,#245236 60%);color:#e8e8e8;min-height:100vh;-webkit-text-size-adjust:100%}
  .wrap{max-width:1100px;margin:0 auto;padding:24px 16px}
  header{margin-bottom:28px;display:flex !important;flex-direction:row !important;align-items:center;justify-content:center;gap:40px;flex-wrap:nowrap !important}
  .header-center{text-align:center;flex:0 0 auto}
  .header-center img.logo-fdq{width:170px;height:170px;border-radius:50%;box-shadow:0 8px 30px rgba(0,0,0,.5),0 0 0 4px #f5c518;margin-bottom:14px}
  .header-center h1{font-size:clamp(26px,5vw,42px);font-weight:900;letter-spacing:.02em;color:#f5c518;text-shadow:2px 2px 0 #000,0 0 20px rgba(245,197,24,.3);text-transform:uppercase;font-style:italic}
  .header-center p{color:#cfd8d2;margin-top:4px;font-size:14px;font-weight:500;letter-spacing:.05em}
  .header-side{display:flex;flex-direction:column;gap:14px;align-items:center}
  .tabs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
  .tab{background:#0d1f12;color:#cfd8d2;border:2px solid #1f4d2b;padding:10px 20px;border-radius:999px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s;text-transform:uppercase;letter-spacing:.03em}
  .tab:hover{background:#1f4d2b;color:#f5c518}
  .tab.active{background:#f5c518;color:#0a1d12;border-color:#f5c518;box-shadow:0 4px 14px rgba(245,197,24,.4)}
  .panel{display:none;background:#0d1f12;border:2px solid #1f4d2b;border-radius:14px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.4)}
  .panel.active{display:block}
  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:14px;min-width:640px}
  th,td{padding:11px 8px;text-align:center;white-space:nowrap}
  th{background:#0a1d12;color:#f5c518;font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;user-select:none;position:sticky;top:0;border-bottom:2px solid #1f4d2b}
  th:hover{color:#fff}
  th.nome,td.nome{text-align:left;padding-left:16px;font-weight:600}
  .delta{display:inline-block;margin-left:8px;font-size:11px;font-weight:800}
  .delta.up{color:#4ade80}
  .delta.down{color:#e84a1f}
  .delta.same{color:#5a6a5e}
  .delta.new{color:#f5c518}
  tbody tr{border-top:1px solid #143820;transition:background .15s}
  tbody tr:nth-child(even){background:#0a1d12}
  tbody tr:hover{background:#1f4d2b !important}
  .pos{font-weight:900;color:#cfd8d2;width:42px;font-size:15px}
  .pts{font-weight:900;color:#f5c518;font-size:16px}
  .negativos.bad{color:#e84a1f;font-weight:700}
  .ultimas{display:inline-flex;gap:4px;align-items:center;justify-content:center}
  .ultimas .dot{width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:12px;line-height:1;font-family:Arial,sans-serif;box-shadow:0 1px 2px rgba(0,0,0,.4)}
  .ultimas .dot.v{background:#22c55e}
  .ultimas .dot.v::before{content:"\2714"}
  .ultimas .dot.d{background:#e84a1f}
  .ultimas .dot.d::before{content:"\2715"}
  .ultimas .dot.e{background:#f5c518;color:#0a1d12}
  .ultimas .dot.e::before{content:"="}
  .ultimas .dot.n{background:#5a6a5e}
  .ultimas .dot.n::before{content:"\2013"}
  @media(max-width:520px){
    .ultimas{gap:3px}
    .ultimas .dot{width:17px;height:17px;font-size:10px}
  }
  /* Calendário */
  .cal-wrap{padding:18px}
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px}
  .cal-head h2{color:#f5c518;font-size:18px;text-transform:capitalize;letter-spacing:.04em}
  .cal-nav{display:flex;gap:6px}
  .cal-nav button{background:#1f4d2b;color:#f5c518;border:none;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px;font-weight:900;transition:background .15s}
  .cal-nav button:hover{background:#2a6b3c}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cal-dow{text-align:center;font-size:11px;font-weight:800;color:#7a8a7e;text-transform:uppercase;letter-spacing:.06em;padding:6px 0;border-bottom:1px solid #1f4d2b}
  .cal-day{background:#0a1d12;border:1px solid #143820;border-radius:8px;min-height:74px;padding:6px;display:flex;flex-direction:column;gap:3px;position:relative;cursor:default;transition:transform .12s,border-color .15s}
  .cal-day.fora-mes{opacity:.35}
  .cal-day.hoje{border-color:#f5c518;box-shadow:0 0 0 2px rgba(245,197,24,.25) inset}
  .cal-day.tem-evento{cursor:pointer}
  .cal-day.tem-evento:hover{transform:translateY(-2px);border-color:#2a6b3c}
  .cal-day.aberto{border-color:#f5c518}
  .cal-num{font-size:13px;font-weight:800;color:#cfd8d2;line-height:1}
  .cal-badge{font-size:10px;font-weight:700;padding:2px 5px;border-radius:4px;display:inline-block;line-height:1.3;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
  .cal-badge.campo{display:flex;flex-direction:column;gap:1px;padding:3px 4px;line-height:1.15;white-space:normal}
  .cal-badge.campo .badge-top{font-size:9px;font-weight:800;letter-spacing:.04em}
  .cal-badge.campo .badge-bot{font-size:10px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cal-clima{font-size:10px;color:#cfd8d2;display:flex;align-items:center;gap:2px;justify-content:center;margin-top:auto;line-height:1}
  .cal-clima .ico{font-size:13px}
  .cal-detalhe .clima{margin-top:10px;padding:8px 10px;background:#143820;border-radius:6px;font-size:13px;color:#cfd8d2;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .cal-detalhe .clima .ico{font-size:22px}
  .cal-badge.society{background:#22c55e;color:#0a1d12}
  .cal-badge.campo{background:#f5c518;color:#0a1d12}
  .cal-badge.campo.v{background:#22c55e;color:#0a1d12}
  .cal-badge.campo.d{background:#e84a1f;color:#fff}
  .cal-badge.campo.e{background:#7a8a7e;color:#0a1d12}
  .cal-badge.campo.realizado{background:#3a8255;color:#cfd8d2}
  .cal-detalhe{margin-top:14px;background:#0a1d12;border:2px solid #f5c518;border-radius:10px;padding:16px;display:none}
  .cal-detalhe.show{display:block;animation:fadein .2s}
  @keyframes fadein{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .cal-detalhe h3{color:#f5c518;font-size:16px;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .cal-detalhe .placar{font-size:24px;font-weight:900;color:#fff;margin:6px 0}
  .cal-detalhe .placar .res-v{color:#22c55e}
  .cal-detalhe .placar .res-d{color:#e84a1f}
  .cal-detalhe .meta{color:#cfd8d2;font-size:13px;line-height:1.7}
  .cal-detalhe .meta strong{color:#f5c518}
  .cal-detalhe .gols{margin-top:8px;color:#cfd8d2;font-size:13px}
  .cal-legenda{margin-top:14px;display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:#cfd8d2;align-items:center}
  .cal-legenda .swatch{display:inline-block;width:14px;height:14px;border-radius:3px;vertical-align:middle;margin-right:5px}
  @media(max-width:520px){
    .cal-wrap{padding:10px}
    .cal-day{min-height:64px;padding:3px;border-radius:6px}
    .cal-num{font-size:11px}
    .cal-badge{font-size:9px;padding:1px 3px}
    .cal-badge.society{font-size:9px}
    .cal-badge.campo{padding:2px 3px}
    .cal-badge.campo .badge-top{font-size:7.5px}
    .cal-badge.campo .badge-bot{font-size:9px}
    .cal-grid{gap:3px}
    .cal-head h2{font-size:15px}
    .cal-nav button{width:32px;height:32px;font-size:16px}
    .cal-dow{font-size:9px;padding:4px 0}
  }
  .empty{text-align:center;padding:50px 20px;color:#7a8a7e;font-style:italic}
  .legenda{padding:16px 20px;background:#0a1d12;border-top:2px solid #1f4d2b;font-size:13px;color:#cfd8d2;line-height:1.8}
  .legenda strong{color:#f5c518}
  footer{text-align:center;margin-top:28px;color:#7a8a7e;font-size:12px;font-weight:500}
  footer strong{color:#f5c518}
  .patrocinador{transition:transform .2s,filter .2s;display:flex;align-items:center;justify-content:center;width:170px;height:110px;padding:6px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
  .patrocinador:hover{transform:translateY(-2px) scale(1.05);filter:drop-shadow(0 6px 14px rgba(245,197,24,.5))}
  .patrocinador img{max-height:105px;max-width:160px;object-fit:contain}
  .patrocinador:has(img[src*="d7"]){width:260px;height:140px}
  .patrocinador img[src*="d7"]{max-height:130px;max-width:240px}
  .reload{position:fixed;bottom:20px;right:20px;background:#f5c518;color:#0a1d12;border:none;width:48px;height:48px;border-radius:50%;font-size:20px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-weight:900;transition:transform .2s}
  .reload:hover{transform:rotate(180deg)}
  @media(max-width:1100px){
    .wrap{padding:18px 12px;max-width:100%}
  }
  /* tablet/janela media: logos nas laterais menores */
  @media(max-width:1100px){
    header{gap:12px}
    .patrocinador{width:120px;height:80px}
    .patrocinador img{max-height:70px;max-width:110px}
    .patrocinador:has(img[src*="d7"]){width:150px;height:90px}
    .patrocinador img[src*="d7"]{max-height:80px;max-width:140px}
    .patrocinador:has(img[src*="vt"]){width:130px;height:85px}
    .patrocinador img[src*="vt"]{max-height:75px;max-width:120px}
    .header-center img.logo-fdq{width:110px;height:110px}
    .header-center h1{font-size:28px}
  }
  @media(max-width:780px){
    header{gap:8px}
    .patrocinador{width:80px;height:55px}
    .patrocinador img{max-height:50px;max-width:75px}
    .patrocinador:has(img[src*="d7"]){width:100px;height:60px}
    .patrocinador img[src*="d7"]{max-height:55px;max-width:90px}
    .patrocinador:has(img[src*="vt"]){width:90px;height:60px}
    .patrocinador img[src*="vt"]{max-height:55px;max-width:80px}
    .header-center img.logo-fdq{width:90px;height:90px}
    .header-center h1{font-size:22px}
    .header-center p{font-size:11px}
    .header-side{gap:6px}
  }
  /* celular: mantem logos nas laterais (2+FDQ+2), tudo bem pequeno */
  @media(max-width:520px){
    th,td{padding:8px 4px;font-size:12px}
    th.nome,td.nome{padding-left:8px;font-size:13px}
    .wrap{padding:14px 4px}
    header{margin-bottom:18px;gap:8px;align-items:center;justify-content:center}
    .header-center img.logo-fdq{width:80px;height:80px;margin-bottom:4px;box-shadow:0 4px 14px rgba(0,0,0,.5),0 0 0 3px #f5c518}
    .header-center h1{font-size:20px;text-shadow:1px 1px 0 #000}
    .header-center p{font-size:11px;margin-top:2px}
    .header-side{gap:6px}
    .patrocinador,
    .patrocinador:has(img[src*="vt"]){width:90px;height:60px;padding:3px}
    .patrocinador img,
    .patrocinador img[src*="vt"]{max-height:54px;max-width:84px}
    .patrocinador:has(img[src*="d7"]){width:120px;height:75px;padding:3px}
    .patrocinador img[src*="d7"]{max-height:70px;max-width:115px}
    .tabs{gap:4px;margin-bottom:14px;flex-wrap:nowrap;padding:0 2px}
    .tab{padding:7px 8px;font-size:10.5px;letter-spacing:.02em;flex:1 1 0;min-width:0;text-align:center}
    .panel{border-radius:10px}
    .legenda{padding:12px 14px;font-size:12px}
    .delta{width:auto;font-size:10px;margin-right:4px}
    .reload{width:42px;height:42px;font-size:18px;bottom:14px;right:14px}
    .pts{font-size:14px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div id="patro-left" class="header-side"></div>
    <div class="header-center">
      <img src="logo.png" class="logo-fdq" alt="FDQ — Futebol de Quinta">
      <h1>FDQ 2026</h1>
      <p>Classificação da temporada</p>
    </div>
    <div id="patro-right" class="header-side"></div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="sem1">1º Semestre</button>
    <button class="tab" data-tab="sem2">2º Semestre</button>
    <button class="tab" data-tab="artilharia">Artilharia</button>
    <button class="tab" data-tab="calendario">Calendário</button>
  </div>

  <div id="sem1" class="panel active"></div>
  <div id="sem2" class="panel"></div>
  <div id="artilharia" class="panel"></div>
  <div id="calendario" class="panel"></div>

  <footer><strong>FUTEBOL DE QUINTA</strong> • desde 2021</footer>
</div>

<button class="reload" onclick="location.reload(true)" title="Atualizar">↻</button>

// Auto-refresh: a cada 60s verifica se ha nova versao publicada e recarrega.
async function checarNovaVersao(){
  try {
    const r = await fetch('build.json?_=' + Date.now(), {cache: 'no-store'});
    if(!r.ok) return;
    const j = await r.json();
    if(j.version && j.version !== BUILD_VERSION){
      // limpa cache do navegador e recarrega
      if('caches' in window){
        try { const ks = await caches.keys(); await Promise.all(ks.map(k => caches.delete(k))); } catch(_){}
      }
      location.reload();
    }
  } catch(_){}
}

const ESTADO = {};

function renderTabela(panelId, dadosOriginais, cols, comLegenda){
  const panel = document.getElementById(panelId);
  if(!dadosOriginais || dadosOriginais.length === 0){
    panel.innerHTML = '<div class="empty">Sem dados ainda — temporada não iniciada.</div>';
    return;
  }
  if(!ESTADO[panelId]) ESTADO[panelId] = { dados: dadosOriginais, cols, comLegenda, sortKey: null, asc: true };

  function desenhar(){
    const st = ESTADO[panelId];
    let dados = st.dados;
    if(st.sortKey){
      dados = [...dados].sort((a,b) => {
        const va = a[st.sortKey], vb = b[st.sortKey];
        const na = (va===''||va==null);
        const nb = (vb===''||vb==null);
        if(na && nb) return 0;
        if(na) return 1;
        if(nb) return -1;
        if(typeof va === 'number' && typeof vb === 'number') return st.asc ? va-vb : vb-va;
        return st.asc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
      });
    }
    let html = '<div class="table-wrap"><table><thead><tr>';
    cols.forEach((c,i) => {
      const arrow = st.sortKey === c.k ? (st.asc ? ' ▲' : ' ▼') : '';
      const tip = c.tip ? ` title="${c.tip}"` : '';
      html += `<th data-col="${i}" class="${c.cls||''}"${tip}>${c.t}${arrow}</th>`;
    });
    html += '</tr></thead><tbody>';
    dados.forEach((r,idx) => {
      html += '<tr>';
      cols.forEach(c => {
        let v = r[c.k];
        if(c.k === 'pos'){
          html += `<td class="pos">${idx+1}</td>`;
        } else if(c.k === 'nome'){
          const d = r.delta;
          const jogou = (DADOS.ultima_jogadores && DADOS.ultima_jogadores[panelId])
            ? DADOS.ultima_jogadores[panelId].includes(v) : true;
          let deltaHtml = '';
          if(jogou && d > 0){
            deltaHtml = `<span class="delta up" title="Subiu ${d} posição(ões) na última rodada">▲${d}</span>`;
          } else if(jogou && d < 0){
            deltaHtml = `<span class="delta down" title="Caiu ${Math.abs(d)} posição(ões) na última rodada">▼${Math.abs(d)}</span>`;
          }
          html += `<td class="nome">${v}${deltaHtml}</td>`;
        } else if(c.k === 'ultimas'){
          const N = 5;
          const mapa = (DADOS.ultimas_resultados && DADOS.ultimas_resultados[panelId]) || {};
          const arr = mapa[r.nome] || [];
          // preenche com placeholders à esquerda (mais antigo) até totalizar N
          const faltam = Math.max(0, N - arr.length);
          const cells = [];
          for(let i=0;i<faltam;i++) cells.push({c:'n', t:'Sem jogo'});
          arr.forEach(x => {
            if(x === 'V') cells.push({c:'v', t:'Vitória'});
            else if(x === 'D') cells.push({c:'d', t:'Derrota'});
            else cells.push({c:'e', t:'Empate'});
          });
          const dots = cells.map(d => `<span class="dot ${d.c}" title="${d.t}"></span>`).join('');
          html += `<td><span class="ultimas">${dots}</span></td>`;
        } else {
          const txt = c.fmt ? c.fmt(v) : (v===''||v==null?'-':v);
          let cls = c.cls || '';
          if(c.k === 'negativos' && v < 0) cls += ' negativos bad';
          html += `<td class="${cls}">${txt}</td>`;
        }
      });
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    if(comLegenda) html += LEGENDA_HTML;
    panel.innerHTML = html;

    panel.querySelectorAll('th').forEach(th => {
      const idx = +th.dataset.col;
      const col = cols[idx];
      if(col.noSort){
        th.style.cursor = 'default';
        return;
      }
      th.addEventListener('click', () => {
        const st = ESTADO[panelId];
        if(st.sortKey === col.k){
          st.asc = !st.asc;
        } else {
          st.sortKey = col.k;
          st.asc = (typeof dadosOriginais[0][col.k] !== 'number');
        }
        desenhar();
      });
    });
  }
  desenhar();
}

let CLIMA_CACHE = null;

async function carregarClima(){
  if(CLIMA_CACHE) return CLIMA_CACHE;
  try {
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=-30.0277&longitude=-51.2287&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weather_code&timezone=America%2FSao_Paulo&forecast_days=16&past_days=92';
    const r = await fetch(url);
    if(!r.ok) return null;
    const j = await r.json();
    const map = {};
    const d = j.daily;
    if(d && d.time){
      d.time.forEach((iso, i) => {
        const tmax = d.temperature_2m_max[i];
        const tmin = d.temperature_2m_min[i];
        if(tmax == null || tmin == null) return;
        map[iso] = {
          tmax: Math.round(tmax),
          tmin: Math.round(tmin),
          chuva: d.precipitation_probability_max[i],
          code: d.weather_code[i],
        };
      });
    }
    CLIMA_CACHE = map;
    return map;
  } catch(e){
    return null;
  }
}

function renderCalendario(){
  const cal = DADOS.calendario || {field_games:[], society:[]};
  const panel = document.getElementById('calendario');
  // indexa eventos por data ISO
  const idx = {};
  const societyResults = cal.society_results || {};
  (cal.society||[]).forEach(d => {
    idx[d] = idx[d] || {};
    idx[d].society = true;
    if(societyResults[d]) idx[d].societyResult = societyResults[d];
  });
  (cal.field_games||[]).forEach(g => {
    idx[g.data] = idx[g.data] || {};
    idx[g.data].campo = g;
  });

  const MESES_NOMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const DOW = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

  // descobrir intervalo de meses (do menor ao maior evento)
  const datas = Object.keys(idx).sort();
  const hoje = new Date();
  let inicio, fim;
  if(datas.length){
    inicio = new Date(datas[0]+'T00:00:00');
    fim = new Date(datas[datas.length-1]+'T00:00:00');
  } else {
    inicio = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
    fim = inicio;
  }
  // mes inicial: o mês atual se estiver dentro do intervalo, senão o primeiro
  let mes = hoje.getMonth();
  let ano = hoje.getFullYear();
  const dentroIntervalo = (a,m) => {
    const d = new Date(a,m,1);
    const ini = new Date(inicio.getFullYear(), inicio.getMonth(), 1);
    const fi = new Date(fim.getFullYear(), fim.getMonth(), 1);
    return d >= ini && d <= fi;
  };
  if(!dentroIntervalo(ano, mes)){
    ano = inicio.getFullYear(); mes = inicio.getMonth();
  }

  let diaSelecionado = null;
  let CLIMA = null;
  carregarClima().then(c => { CLIMA = c; if(c) desenhar(); });

  function isoData(a,m,d){
    return `${a}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  function desenhar(){
    const primeiroDia = new Date(ano, mes, 1);
    const ultimoDia = new Date(ano, mes+1, 0);
    const offset = primeiroDia.getDay(); // 0=dom
    const totalDias = ultimoDia.getDate();
    const hojeIso = isoData(hoje.getFullYear(), hoje.getMonth(), hoje.getDate());

    let html = '<div class="cal-wrap">';
    html += '<div class="cal-head">';
    html += '<div class="cal-nav"><button id="cal-prev" title="Mês anterior">‹</button></div>';
    html += `<h2>${MESES_NOMES[mes]} ${ano}</h2>`;
    html += '<div class="cal-nav"><button id="cal-next" title="Próximo mês">›</button></div>';
    html += '</div>';
    html += '<div class="cal-grid">';
    DOW.forEach(d => { html += `<div class="cal-dow">${d}</div>`; });
    // dias do mês anterior (fora-mes)
    const diasAntes = new Date(ano, mes, 0).getDate();
    for(let i=offset-1;i>=0;i--){
      html += `<div class="cal-day fora-mes"><div class="cal-num">${diasAntes-i}</div></div>`;
    }
    for(let d=1; d<=totalDias; d++){
      const iso = isoData(ano,mes,d);
      const ev = idx[iso];
      const ehHoje = (iso === hojeIso);
      const classes = ['cal-day'];
      if(ehHoje) classes.push('hoje');
      if(ev) classes.push('tem-evento');
      if(diaSelecionado === iso) classes.push('aberto');
      html += `<div class="${classes.join(' ')}" data-iso="${iso}"><div class="cal-num">${d}</div>`;
      if(ev){
        if(ev.society){
          html += `<span class="cal-badge society" title="Society FDQ">🟢 FDQ</span>`;
        }
        if(ev.campo){
          let extra = '';
          const g = ev.campo;
          if(g.placar_fdq != null && g.placar_adv != null){
            if(g.placar_fdq > g.placar_adv) extra = ' v';
            else if(g.placar_fdq < g.placar_adv) extra = ' d';
            else extra = ' e';
          } else if(iso < hojeIso){
            extra = ' realizado';
          }
          html += `<span class="cal-badge campo${extra}" title="FDQAMPO × ${g.adversario}"><span class="badge-top">⚽ FDQAMPO</span><span class="badge-bot">vs ${g.adversario}</span></span>`;
        }
        // previsão do tempo (até 16 dias)
        if(CLIMA && CLIMA[iso]){
          const c = CLIMA[iso];
          const w = WMO[c.code] || ['','—'];
          html += `<span class="cal-clima" title="${w[1]} · Máx ${c.tmax}° · Mín ${c.tmin}° · Chuva ${c.chuva}%"><span class="ico">${w[0]}</span> ${c.tmax}°</span>`;
        }
      }
      html += '</div>';
    }
    // completa última semana
    const usado = offset + totalDias;
    const sobra = (7 - (usado % 7)) % 7;
    for(let i=1;i<=sobra;i++){
      html += `<div class="cal-day fora-mes"><div class="cal-num">${i}</div></div>`;
    }
    html += '</div>'; // grid

    // legenda
    html += '<div class="cal-legenda">';
    html += '<span><span class="swatch" style="background:#22c55e"></span>Society / Vitória</span>';
    html += '<span><span class="swatch" style="background:#f5c518"></span>Jogo agendado</span>';
    html += '<span><span class="swatch" style="background:#3a8255"></span>Realizado (sem placar)</span>';
    html += '<span><span class="swatch" style="background:#e84a1f"></span>Derrota</span>';
    html += '<span><span class="swatch" style="background:#7a8a7e"></span>Empate</span>';
    html += '</div>';

    // painel de detalhes
    html += '<div class="cal-detalhe" id="cal-detalhe"></div>';
    html += '</div>'; // cal-wrap
    panel.innerHTML = html;

    // navegação
    document.getElementById('cal-prev').addEventListener('click', () => {
      mes--;
      if(mes < 0){ mes = 11; ano--; }
      diaSelecionado = null;
      desenhar();
    });
    document.getElementById('cal-next').addEventListener('click', () => {
      mes++;
      if(mes > 11){ mes = 0; ano++; }
      diaSelecionado = null;
      desenhar();
    });
    // clique nos dias com evento
    panel.querySelectorAll('.cal-day.tem-evento').forEach(el => {
      el.addEventListener('click', () => {
        const iso = el.dataset.iso;
        diaSelecionado = (diaSelecionado === iso) ? null : iso;
        atualizarDetalhe();
        panel.querySelectorAll('.cal-day').forEach(d => d.classList.remove('aberto'));
        if(diaSelecionado) el.classList.add('aberto');
      });
    });

    if(diaSelecionado) atualizarDetalhe();
  }

  function atualizarDetalhe(){
    const det = document.getElementById('cal-detalhe');
    if(!det) return;
    if(!diaSelecionado){ det.classList.remove('show'); det.innerHTML=''; return; }
    const ev = idx[diaSelecionado];
    if(!ev){ det.classList.remove('show'); det.innerHTML=''; return; }
    const [a,m,d] = diaSelecionado.split('-');
    const dt = new Date(+a, +m-1, +d);
    const dataFmt = `${dt.getDate()}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()}`;
    const diaSem = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'][dt.getDay()];
    let html = `<h3>📅 ${diaSem}, ${dataFmt}</h3>`;
    if(ev.society){
      html += '<div class="meta">🟢 <strong>Society FDQ</strong></div>';
      const hojeIso3 = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}-${String(hoje.getDate()).padStart(2,'0')}`;
      if(!ev.societyResult && diaSelecionado >= hojeIso3){
        html += '<div class="meta" style="color:#f5c518;margin-top:6px">⏳ Jogo ainda não realizado</div>';
      }
      if(ev.societyResult){
        const s = ev.societyResult;
        if(s.rodada) html += `<div class="meta" style="margin-top:4px">Rodada ${s.rodada}</div>`;
        if(s.placar_a != null){
          const venceuA = s.placar_a > s.placar_b;
          const empate = s.placar_a === s.placar_b;
          html += `<div class="placar" style="margin-top:8px"><span class="${venceuA?'res-v':(empate?'':'res-d')}">Time A ${s.placar_a}</span> × <span class="${!venceuA && !empate?'res-v':(empate?'':'res-d')}">${s.placar_b} Time B</span></div>`;
        }
        function renderTime(label, jogadores){
          if(!jogadores || !jogadores.length) return '';
          const ordenados = [...jogadores].sort((a,b)=>b.gols-a.gols);
          const items = ordenados.map(j => j.gols > 0 ? `<strong>${j.nome}</strong> ${'⚽'.repeat(j.gols)}` : j.nome);
          return `<div class="gols"><strong>${label}:</strong> ${items.join(' · ')}</div>`;
        }
        html += renderTime('Time A', s.time_a);
        html += renderTime('Time B', s.time_b);
        if(s.churras && s.churras.length){
          html += `<div class="gols">🍖 <strong>Só churras:</strong> ${s.churras.join(', ')}</div>`;
        }
      }
    }
    if(ev.campo){
      const g = ev.campo;
      html += `<div class="meta" style="margin-top:8px">⚽ <strong>FDQAMPO</strong></div>`;
      html += `<div class="meta">vs <strong>${g.adversario}</strong> · ${g.regiao}</div>`;
      if(g.placar_fdq != null && g.placar_adv != null){
        let res = 'res-e';
        if(g.placar_fdq > g.placar_adv) res = 'res-v';
        else if(g.placar_fdq < g.placar_adv) res = 'res-d';
        html += `<div class="placar"><span class="${res}">FDQAMPO ${g.placar_fdq} × ${g.placar_adv} ${g.adversario}</span></div>`;
        if(g.gols && g.gols.length){
          const lista = g.gols.map(x => typeof x === 'string' ? x : (x.jogador + (x.qtd>1?' ('+x.qtd+')':'')));
          html += `<div class="gols">⚽ <strong>Gols FDQAMPO:</strong> ${lista.join(', ')}</div>`;
        }
      } else {
        const hojeIso2 = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}-${String(hoje.getDate()).padStart(2,'0')}`;
        if(diaSelecionado < hojeIso2){
          html += '<div class="meta" style="color:#3a8255;margin-top:6px">✓ Jogo realizado — placar a confirmar</div>';
        } else {
          html += '<div class="meta" style="color:#f5c518;margin-top:6px">⏳ Jogo ainda não realizado</div>';
        }
      }
      if(g.obs) html += `<div class="meta" style="margin-top:6px">📝 ${g.obs}</div>`;
    }
    // bloco de clima no detalhe (society ou campo)
    if(CLIMA && CLIMA[diaSelecionado]){
      const c = CLIMA[diaSelecionado];
      const w = WMO[c.code] || ['🌡️','—'];
      const chuvaTxt = (c.chuva != null) ? ` · 💧 ${c.chuva}% chuva` : '';
      html += `<div class="clima"><span class="ico">${w[0]}</span><span><strong>${w[1]}</strong> · Máx ${c.tmax}° · Mín ${c.tmin}°${chuvaTxt}</span></div>`;
    }
    det.innerHTML = html;
    det.classList.add('show');
    det.scrollIntoView({behavior:'smooth', block:'nearest'});
  }

  desenhar();
}

if(DADOS.patrocinadores && DADOS.patrocinadores.length){
  const left = document.getElementById('patro-left');
  const right = document.getElementById('patro-right');
  const meio = Math.ceil(DADOS.patrocinadores.length / 2);
  DADOS.patrocinadores.forEach((p, idx) => {
    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.className = 'patrocinador';
    a.title = p.nome;
    const img = document.createElement('img');
    img.src = 'patrocinadores/' + p.arquivo;
    img.alt = p.nome;
    a.appendChild(img);
    (idx < meio ? left : right).appendChild(a);
  });
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(t.dataset.tab).classList.add('active');
  });
});
</script>
</body>
</html>
