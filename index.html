<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
  .wrap{max-width:1100px;margin:0 auto;padding:24px 16px}
  header{text-align:center;margin-bottom:24px}
  header h1{font-size:clamp(24px,5vw,40px);font-weight:800;letter-spacing:-.02em;background:linear-gradient(135deg,#38bdf8,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent}
  header p{color:#94a3b8;margin-top:4px;font-size:14px}
  .tabs{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
  .tab{background:#1e293b;color:#cbd5e1;border:1px solid #334155;padding:10px 18px;border-radius:999px;cursor:pointer;font-weight:600;font-size:14px;transition:all .2s}
  .tab:hover{background:#334155}
  .tab.active{background:linear-gradient(135deg,#38bdf8,#a78bfa);color:#0f172a;border-color:transparent}
  .panel{display:none;background:#1e293b;border:1px solid #334155;border-radius:16px;overflow:hidden}
  .panel.active{display:block}
  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:14px;min-width:640px}
  th,td{padding:10px 8px;text-align:center;white-space:nowrap}
  th{background:#0f172a;color:#94a3b8;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;user-select:none;position:sticky;top:0}
  th:hover{color:#e2e8f0}
  th.nome,td.nome{text-align:left;padding-left:16px;font-weight:500}
  tbody tr{border-top:1px solid #334155;transition:background .15s}
  tbody tr:hover{background:#0f172a}
  .pos{font-weight:700;color:#94a3b8;width:40px}
  .pos.top1{color:#fbbf24}
  .pos.top2{color:#cbd5e1}
  .pos.top3{color:#fb923c}
  .pts{font-weight:700;color:#38bdf8;font-size:15px}
  .negativos.bad{color:#f87171}
  .empty{text-align:center;padding:40px 20px;color:#64748b}
  .legenda{padding:16px 20px;background:#0f172a;border-top:1px solid #334155;font-size:13px;color:#94a3b8;line-height:1.7}
  .legenda strong{color:#cbd5e1}
  footer{text-align:center;margin-top:24px;color:#64748b;font-size:12px}
  @media(max-width:600px){
    th,td{padding:8px 4px;font-size:12px}
    th.nome,td.nome{padding-left:8px}
    .wrap{padding:16px 8px}
  }
</style>
</head>

    <strong>Desempate:</strong> 1) Presença · 2) Vitórias · 3) Gols &nbsp;|&nbsp; <strong>GM:</strong> gols marcados · <strong>GS:</strong> gols sofridos
  </div>`;

function renderTabela(panelId, dados, cols, comLegenda){
  const panel = document.getElementById(panelId);
  if(!dados || dados.length === 0){
    panel.innerHTML = '<div class="empty">Sem dados ainda — temporada não iniciada.</div>';
    return;
  }
  let html = '<div class="table-wrap"><table><thead><tr>';
  cols.forEach((c,i) => {
    html += `<th data-col="${i}" class="${c.cls||''}">${c.t}</th>`;
  });
  html += '</tr></thead><tbody>';
  dados.forEach((r,idx) => {
    const pos = r.pos || (idx+1);
    const posCls = pos===1?'top1':pos===2?'top2':pos===3?'top3':'';
    html += '<tr>';
    cols.forEach(c => {
      let v = r[c.k];
      if(c.k === 'pos'){
        html += `<td class="pos ${posCls}">${pos}</td>`;
      } else {
        const txt = c.fmt ? c.fmt(v) : (v===''||v==null?'-':v);
        let cls = c.cls || '';
        if(c.k === 'negativos' && v < 0) cls += ' negativos bad';
        html += `<td class="${cls}">${txt}</td>`;
      }
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  if(comLegenda) html += LEGENDA_HTML;
  panel.innerHTML = html;

  panel.querySelectorAll('th').forEach(th => {
    th.addEventListener('click', () => {
      const idx = +th.dataset.col;
      const col = cols[idx];
      const asc = th.dataset.dir !== 'asc';
      panel.querySelectorAll('th').forEach(x => delete x.dataset.dir);
      th.dataset.dir = asc ? 'asc' : 'desc';
      const sorted = [...dados].sort((a,b) => {
        const va = a[col.k], vb = b[col.k];
        if(typeof va === 'number') return asc ? va-vb : vb-va;
        return asc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
      });
      renderTabela(panelId, sorted, cols, comLegenda);
    });
  });
}

renderTabela('artilharia', DADOS.artilharia, COLS_ART, false);

document.querySelectorAll('.tab').forEach(t => {

    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(t.dataset.tab).classList.add('active');
  });
});
